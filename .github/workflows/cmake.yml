name: CMake Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ~/.cache/ccache
    strategy:
      matrix:
        config:
          # Disable basic build -- duplicated by the install step
          #- name: "Basic Build"
          #  options: ""
          - name: "Without Thrift"
            options: "-DWITH_THRIFT=OFF"
          # FIXME: temporarily disable Without Nanomsg test
          # This test is failing to build correctly due to programs in tests
          # needing the bmapps lib which is not build when nanomsg is disabled.
          # The same problem occurs with using autoconf, except the binaries in
          # tests only get compiled when running "make check".
          # - name: "Without Nanomsg"
          #   options: "-DWITH_NANOMSG=OFF"
          - name: "With Debugger"
            options: "-DENABLE_DEBUGGER=ON"

    name: ${{ matrix.config.name }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-cmake-build-${{ hashFiles('CMakeLists.txt', '.github/workflows/cmake.yml', 'install_deps.sh') }}
        restore-keys: |
          ccache-cmake-build-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y automake cmake libgmp-dev \
          libpcap-dev libboost-dev libboost-test-dev libboost-program-options-dev \
          libboost-system-dev libboost-filesystem-dev libboost-thread-dev \
          libevent-dev libtool flex bison pkg-config g++ libssl-dev ccache
        bash ./ci/install-thrift.sh
        bash ./ci/install-nanomsg.sh
        bash ./ci/install-pynng.sh
        sudo ldconfig

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=2G
        ccache -z

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake ${{ matrix.config.options }} ..

    - name: Build
      run: |
        cd build
        cmake --build .

    - name: Test
      run: |
        cd build
        ctest --output-on-failure

    - name: Show ccache stats
      if: ${{ always() }}
      run: ccache -s

  install:
    runs-on: ubuntu-latest
    name: "Build and install"
    env:
      CCACHE_DIR: ~/.cache/ccache

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-cmake-install-${{ hashFiles('CMakeLists.txt', '.github/workflows/cmake.yml', 'install_deps.sh') }}
        restore-keys: |
          ccache-cmake-install-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y automake cmake libgmp-dev \
          libpcap-dev libboost-dev libboost-test-dev libboost-program-options-dev \
          libboost-system-dev libboost-filesystem-dev libboost-thread-dev \
          libevent-dev libtool flex bison pkg-config g++ libssl-dev ccache
        bash ./ci/install-thrift.sh
        bash ./ci/install-nanomsg.sh
        bash ./ci/install-pynng.sh
        sudo ldconfig

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=2G
        ccache -z

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake ..

    - name: Build
      run: |
        cd build
        cmake --build .

    - name: Install
      run: |
        cd build
        sudo cmake --build . --target install

    - name: Show ccache stats
      if: ${{ always() }}
      run: ccache -s
