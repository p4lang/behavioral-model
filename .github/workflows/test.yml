name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel any preceding run on the pull request.
concurrency:
  group: test-bmv2-ubuntu-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check-changes:
    name: Check whether tests need to be run based on diff
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: antrea-io/has-changes@v2
      id: check_diff
      with:
        paths-ignore: docs/* *.md
    outputs:
      has_changes: ${{ steps.check_diff.outputs.has_changes }}

  test:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.has_changes == 'yes' }}
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }}, ${{ matrix.cc }})
    env:
      CCACHE_DIR: ~/.cache/ccache
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-22.04
          cxx: g++
          cc: gcc
          gcov: gcov
        - os: ubuntu-22.04
          cxx: clang++
          cc: clang
          gcov: ""
        - os: ubuntu-24.04
          cxx: g++
          cc: gcc
          gcov: gcov
        - os: ubuntu-24.04
          cxx: clang++
          cc: clang
          gcov: ""
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ matrix.os }}-${{ matrix.cc }}-${{ hashFiles('configure.ac', 'Makefile.am', '.github/workflows/test.yml', 'install_deps.sh') }}
        restore-keys: |
          ccache-${{ matrix.os }}-${{ matrix.cc }}-
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo ./install_deps.sh
        sudo apt-get install -y lcov
        if [ "${{ matrix.cc }}" = "clang" ]; then
          sudo apt-get install -y clang
        fi
    - name: Configure ccache
      run: |
        ccache --set-config=max_size=2G
        ccache -z
    - name: Run tests
      env:
        CC: ccache ${{ matrix.cc }}
        CXX: ccache ${{ matrix.cxx }}
        GCOV: ${{ matrix.gcov }}
      run: |
        ./autogen.sh
        CONFIG_FLAGS="--with-pdfixed --with-pi --with-stress-tests --enable-debugger --enable-Werror"
        if [ -n "$GCOV" ]; then
          ./configure $CONFIG_FLAGS --enable-coverage
        else
          ./configure $CONFIG_FLAGS
        fi
        make -j$(nproc)
        make check -j$(nproc)
        ./ci/codecov.sh
    - name: Show ccache stats
      if: ${{ always() }}
      run: ccache -s
    - name: Check style
      run: |
        ./tools/check_style.sh

  test-no-pi:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.has_changes == 'yes' }}
    runs-on: ${{ matrix.os }}
    name: test-no-pi (${{ matrix.os }})
    env:
      CCACHE_DIR: ~/.cache/ccache
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ matrix.os }}-no-pi-${{ hashFiles('configure.ac', 'Makefile.am', '.github/workflows/test.yml', 'install_deps.sh') }}
        restore-keys: |
          ccache-${{ matrix.os }}-no-pi-
          ccache-${{ matrix.os }}-
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo ./install_deps.sh
    - name: Configure ccache
      run: |
        ccache --set-config=max_size=2G
        ccache -z
    - name: Run tests
      env:
        CC: ccache gcc
        CXX: ccache g++
      run: |
        ./autogen.sh
        ./configure --enable-debugger --enable-Werror
        make -j$(nproc)
        make check -j$(nproc)
    - name: Show ccache stats
      if: ${{ always() }}
      run: ccache -s

  test-cmake:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.has_changes == 'yes' }}
    runs-on: ${{ matrix.os }}
    name: test-cmake (${{ matrix.os }})
    env:
      CCACHE_DIR: ~/.cache/ccache
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ matrix.os }}-cmake-${{ hashFiles('CMakeLists.txt', '.github/workflows/test.yml', 'install_deps.sh') }}
        restore-keys: |
          ccache-${{ matrix.os }}-cmake-
          ccache-${{ matrix.os }}-
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo ./install_deps.sh
    - name: Configure ccache
      run: |
        ccache --set-config=max_size=2G
        ccache -z
    - name: Build BMv2
      run: |
        mkdir -p build
        cd build
        cmake -DWITH_PDFIXED=ON -DWITH_PI=ON -DWITH_STRESS_TESTS=ON -DENABLE_DEBUGGER=ON -DENABLE_WERROR=ON ..
        make -j$(nproc)
    - name: Run tests
      run: cd build && make -j$(nproc) && ctest -j$(nproc) --output-on-failure
    - name: Show ccache stats
      if: ${{ always() }}
      run: ccache -s
